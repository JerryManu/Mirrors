<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0c0810"/>
      <stop offset="100%" stop-color="#040406"/>
    </radialGradient>

    <radialGradient id="irisGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="pupilGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f3e8ff" stop-opacity="1"/>
      <stop offset="40%" stop-color="#d8b4fe" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
    </radialGradient>

    <filter id="glow3">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow8">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="114" fill="url(#bg)"/>

  <!-- Outer soft glow halo behind the eye -->
  <ellipse cx="256" cy="256" rx="160" ry="80"
           fill="#c084fc"
           opacity="0.04"
           filter="url(#glow8)"/>

  <!-- Eye upper arc -->
  <path d="M 96 256 Q 176 152 256 140 Q 336 152 416 256"
        fill="none"
        stroke="#d8b4fe"
        stroke-width="1.2"
        stroke-linecap="round"
        opacity="0.55"
        filter="url(#glow1)"/>

  <!-- Eye lower arc -->
  <path d="M 96 256 Q 176 360 256 372 Q 336 360 416 256"
        fill="none"
        stroke="#c084fc"
        stroke-width="0.9"
        stroke-linecap="round"
        opacity="0.35"
        filter="url(#glow1)"/>

  <!-- Iris glow fill -->
  <circle cx="256" cy="256" r="72"
          fill="url(#irisGlow)"/>

  <!-- Iris ring outer -->
  <circle cx="256" cy="256" r="72"
          fill="none"
          stroke="#d8b4fe"
          stroke-width="0.8"
          opacity="0.35"
          filter="url(#glow1)"/>

  <!-- Iris ring inner -->
  <circle cx="256" cy="256" r="50"
          fill="none"
          stroke="#c084fc"
          stroke-width="0.5"
          opacity="0.2"/>

  <!-- Spiral — one continuous inward curve -->
  <path d="M 256 256
           Q 270 246 272 232
           Q 274 214 258 206
           Q 240 198 228 212
           Q 216 228 222 246
           Q 230 266 250 272
           Q 274 278 290 260
           Q 306 240 298 216
           Q 288 188 262 180
           Q 232 172 208 188
           Q 182 206 180 234"
        fill="none"
        stroke="#e9d5ff"
        stroke-width="0.7"
        stroke-linecap="round"
        opacity="0.22"/>

  <!-- Pupil glow soft halo -->
  <circle cx="256" cy="256" r="20"
          fill="#c084fc"
          opacity="0.08"
          filter="url(#glow8)"/>

  <!-- Pupil -->
  <circle cx="256" cy="256" r="14"
          fill="#0c0810"
          stroke="#d8b4fe"
          stroke-width="0.6"
          opacity="0.9"/>

  <!-- Centre light — the self -->
  <circle cx="256" cy="256" r="4"
          fill="url(#pupilGlow)"
          filter="url(#glow3)"
          opacity="0.95"/>

  <!-- Tiny catchlight -->
  <circle cx="260" cy="252" r="1.2"
          fill="#ffffff"
          opacity="0.7"/>

  <!-- Three ascending dots — path upward -->
  <circle cx="256" cy="230" r="1.2" fill="#d8b4fe" opacity="0.4"/>
  <circle cx="256" cy="218" r="0.9" fill="#c084fc" opacity="0.28"/>
  <circle cx="256" cy="208" r="0.6" fill="#c084fc" opacity="0.16"/>
</svg>
